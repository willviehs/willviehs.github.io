<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시스템 메뉴</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px 20px; border-bottom: 1px solid #ddd; margin-bottom: 30px; }
        .change-btn { background: #666; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div>현재 사업장: <b id="currentSite"></b></div>
        <button class="change-btn" onclick="location.href='index.html'">◀ 사업장 변경</button>
    </div>

    <div class="menu-container">
        <h1>원하시는 업무를 선택하세요</h1>
        <div class="menu-grid">
            <button class="menu-item" onclick="location.href='edu_list.html'">📝 안전보건교육</button>
            <button class="menu-item">🤝 산업안전보건위원회</button>
            <button class="menu-item">📋 안전점검</button>
            <button class="menu-item">🏥 건강관리</button>
            <button class="menu-item">🔥 화재예방</button>
            <button class="menu-item">🛡️ 보호구관리</button>
            <button class="menu-item">⚠️ 사고조사</button>
            <button class="menu-item">📜 법령정보</button>
        </div>
    </div>

    <script>
        document.getElementById('currentSite').innerText = localStorage.getItem('selectedSite') || "미선택";
    </script>
</body>
</html>
