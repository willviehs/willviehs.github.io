<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전관리 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WILL & VISION</div>
        <div class="nav-menu" id="topNav"></div>
    </nav>

    <div class="container">
        <div class="board-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="boardTitle">게시판</h2>
                <button class="btn-primary" onclick="alert('관리자 모드 준비 중입니다.')">➕ 자료 업로드</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:10%;">번호</th>
                        <th>제목</th>
                        <th style="width:15%;">작성자</th>
                        <th style="width:20%;">날짜</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td style="text-align:left;">안전보건 자료가 준비 중입니다.</td>
                        <td>김혜현 대리</td>
                        <td>2026-05-12</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        const titles = { 
            'notice': '📌 게시판 게시 서류', 
            'manual': '📚 절차서 및 지침서',
            'msds': '🧪 물질안전보건자료(MSDS)',
            'ergonomics': '🦴 근골격계부담작업 유해요인조사'
        };
        document.getElementById('boardTitle').innerText = titles[cat] || '안전관리 게시판';
    </script>
</body>
</html>
