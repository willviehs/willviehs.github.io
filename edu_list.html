<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전보건교육 게시판</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-buttons { margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-nav { background: #eee; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .board-container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        /* 기존 스타일 동일 */
    </style>
</head>
<body>
    <div class="board-container">
        <div class="nav-buttons">
            <button class="btn-nav" onclick="location.href='category.html'">◀ 메뉴로 돌아가기</button>
            <button class="btn-nav" onclick="location.href='index.html'">🏠 사업장 재선택</button>
        </div>
        
        <div class="board-header">
            <h2>📁 안전보건교육 게시판 (<span id="siteDisplay"></span>)</h2>
            <button class="btn-write" onclick="openModal()">➕ 새 교육일지 작성</button>
        </div>
        </div>

    <script>
        document.getElementById('siteDisplay').innerText = localStorage.getItem('selectedSite') || "미선택";
        // 기존 스크립트 동일 (openModal, startWrite 등)
    </script>
</body>
</html>
