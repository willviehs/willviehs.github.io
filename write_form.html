<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교육일지 작성 시스템</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .paper { width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); box-sizing: border-box; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; height: 25px; }
        th { background: #f2f2f2; font-weight: bold; }
        .text-left { text-align: left; padding-left: 10px; }
        .content-box { border: 1px solid #000; padding: 15px; min-height: 250px; line-height: 1.8; text-align: left; }
        @media print { .no-print { display: none; } .paper { margin: 0; box-shadow: none; } }
    </style>
</head>
<body>
    <div class="no-print" style="text-align: center; background: #333; padding: 15px; color: white;">
        <span id="typeNotice" style="font-weight:bold; color:#ffeb3b;"></span> 작성 중... 
        <button class="btn-write" onclick="window.print()" style="margin-left:20px;">📄 PDF 저장 / 인쇄</button>
        <button onclick="history.back()" style="background:#666; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">뒤로가기</button>
    </div>

    <div class="paper">
        <h1 style="text-align: center; text-decoration: underline; margin-bottom: 10px;" id="docTitle">교육 일지</h1>
        
        <table style="width: 200px; float: right;">
            <tr><th rowspan="2" style="width: 30px;">결<br>재</th><th>담당</th><th>검토</th><th>승인</th></tr>
            <tr style="height: 60px;"><td></td><td></td><td></td></tr>
        </table>
        <div style="clear: both;"></div>

        <table>
            <tr>
                <th style="width: 15%;">사업장명</th><td class="text-left" colspan="3"><b id="siteName"></b></td>
            </tr>
            <tr>
                <th>교육일자</th><td><input type="date" value="2026-05-12" style="border:none; width:95%; font-size:13px;"></td>
                <th>교육시간</th><td><input type="text" id="timeInput" style="border:none; width:95%; text-align:center;"></td>
            </tr>
            <tr>
                <th>교육장소</th><td><input type="text" placeholder="현장 및 사무실" style="border:none; width:95%;"></td>
                <th>교육실시자</th><td><input type="text" value="김혜현 대리" style="border:none; width:95%; text-align:center;"></td>
            </tr>
        </table>

        <h3 style="margin-top: 20px;">■ 교육내용</h3>
        <div class="content-box" id="eduContent">
            </div>

        <h3 style="margin-top: 20px;">■ 참석자 명단</h3>
        <table>
            <tr><th style="width:8%;">번호</th><th style="width:20%;">직종</th><th style="width:22%;">성명</th><th style="width:50%;">서명</th></tr>
            <tr><td>1</td><td></td><td></td><td></td></tr>
            <tr><td>2</td><td></td><td></td><td></td></tr>
            <tr><td>3</td><td></td><td></td><td></td></tr>
            <tr><td>4</td><td></td><td></td><td></td></tr>
            <tr><td>5</td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <script>
        const type = localStorage.getItem('currentEduType');
        const site = localStorage.getItem('selectedSite');
        document.getElementById('siteName').innerText = site;

        const eduData = {
            '정기': {
                title: '정기 교육 일지 (근로자)',
                time: '00:00 ~ 00:00 (2시간)',
                content: '○ 산업안전 및 산업재해 예방에 관한 사항<br>○ 산업보건 및 건강장해 예방에 관한 사항<br>○ 위험성 평가에 관한 사항<br>○ 산업안전보건법령 및 산업재해보상보험 제도에 관한 사항<br>○ 직무스트레스 예방 및 관리에 관한 사항'
            },
            'MSDS': {
                title: '물질안전보건자료(MSDS) 교육 일지',
                time: '00:00 ~ 00:00 (30분)',
                content: '○ 대상화학물질의 명칭(또는 제품명)<br>○ 물리적 위험성 및 건강 유해성<br>○ 취급상의 주의사항 및 적절한 보호구<br>○ 응급조치 요령 및 사고 시 대처방법<br>○ MSDS 및 경고표지를 이해하는 방법'
            },
            '채용': {
                title: '채용 시 교육 일지 (근로자)',
                time: '00:00 ~ 00:00 (8시간)',
                content: '○ 기계·기구의 위험성과 작업의 순서 및 동선에 관한 사항<br>○ 작업 개시 전 점검에 관한 사항<br>○ 정리정돈 및 청소에 관한 사항<br>○ 사고 발생 시 긴급조치에 관한 사항'
            }
            // 나머지 서식들도 여기에 추가하면 됩니다.
        };

        const currentData = eduData[type] || eduData['정기'];
        document.getElementById('docTitle').innerText = currentData.title;
        document.getElementById('typeNotice').innerText = currentData.title;
        document.getElementById('timeInput').value = currentData.time;
        document.getElementById('eduContent').innerHTML = currentData.content;
    </script>
</body>
</html>
