<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WILL & VISION 안전보건 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* [1페이지] 선택 화면 */
        #selection-page { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; padding: 20px; }
        .logo-area { margin-bottom: 30px; }
        .logo-main { font-size: 32px; font-weight: bold; color: #0066ff; letter-spacing: 1px; }
        .logo-sub { font-size: 18px; color: #333; margin-top: 5px; font-weight: bold; }
        .select-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        .card-title { font-size: 17px; margin-bottom: 20px; color: #444; font-weight: bold; }
        .styled-select { width: 100%; padding: 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 25px; background: #fff; max-height: 200px; }
        .start-btn { width: 100%; padding: 15px; background: #0052cc; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }

        /* [2페이지] 일지 화면 */
        #report-page { display: none; padding: 30px; }
        .container { max-width: 850px; margin: 0 auto; border: 2px solid #333; padding: 40px; background: #fff; }
        .no-print { display: flex; justify-content: space-between; max-width: 850px; margin: 0 auto 25px auto; }
        .back-btn { background: #eeeeee; color: #333; border: 1px solid #ccc; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .print-btn { background: #0052cc; color: white; border: none; padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        h1 { text-align: center; text-decoration: underline; margin-bottom: 30px; font-size: 26px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: -1px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f9f9f9; font-weight: bold; }
        input { width: 95%; border: 1px solid #eee; padding: 5px; font-size: 14px; text-align: center; font-family: inherit; }
        .content-box { border: 2px solid #333; padding: 20px; text-align: left; font-size: 14px; margin: 20px 0; line-height: 1.6; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .container { border: none !important; width: 100%; padding: 0; }
            input { border: none !important; }
        }
    </style>
</head>
