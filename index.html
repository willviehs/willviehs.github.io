<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>위험성평가 사전교육일지 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; border: 1px solid #000; padding: 40px; background: #fff; }
        
        /* 헤더/출력 버튼 */
        .no-print { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .print-btn { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .print-btn:hover { background: #0056b3; }

        /* 테이블 스타일 */
        h1 { text-align: center; text-decoration: underline; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f2f2f2; width: 120px; }
        
        /* 입력 요소 스타일 */
        select, input[type="date"], input[type="time"], input[type="text"] {
            width: 90%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;
        }
        .content-box { border: 1px solid #000; padding: 15px; text-align: left; font-size: 14px; margin-bottom: 20px; }
        .content-box ul { margin: 5px 0; padding-left: 20px; }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            .container { border: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div>
        <strong>🏢 사업장 선택:</strong>
        <select id="siteSelect" onchange="updateSiteName()">
            <option value="">-- 사업장을 선택하세요 --</option>
            <option value="SK-C타워">SK-C타워</option>
            <option value="윌앤비전 본사">윌앤비전 본사</option>
            <option value="영등포 사업장">영등포 사업장</option>
            <option value="당산동 관리단지">당산동 관리단지</option>
        </select>
    </div>
    <button class="print-btn" onclick="window.print()">📄 PDF 저장 / 출력</button>
</div>

<div class="container">
    <h1>위험성평가 사전교육일지</h1>

    <table>
        <tr>
            <th>사업장명</th>
            <td id="displaySiteName" style="font-weight:bold; color:blue;">(사업장을 선택해주세요)</td>
            <th>교육일자</th>
            <td><input type="date" id="eduDate"></td>
        </tr>
        <tr>
            <th>교육방법</th>
            <td colspan="3" style="text-align:left; padding-left:20px;">
                <label><input type="checkbox"> 강의(시청각)</label> &nbsp;
                <label><input type="checkbox"> 현장</label> &nbsp;
                <label><input type="checkbox"> 기타</label>
                (<input type="text" style="width:150px; border-bottom:1px solid #000; border-top:none; border-left:none; border-right:none;">)
            </td>
        </tr>
        <tr>
            <th>교육시간</th>
            <td>
                <input type="time" id="startTime"> ~ <input type="time" id="endTime">
            </td>
            <th>교육인원</th>
            <td>계: <input type="number" style="width:50px;"> 명</td>
        </tr>
        <tr>
            <th>교육장소</th>
            <td colspan="3"><input type="text" placeholder="예: 대회의실, 현장 사무소 등"></td>
        </tr>
    </table>

        <strong>[교육내용]</strong>
        <ul>

            <li>○ 「위험성평가」를 위한 사전준비 및 유해 위험요인 파악 방법</li>
            <li>○
