<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WILL & VISION 안전보건 관리 시스템</title>
    <style>
        /* 기본 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* [1페이지] 사업장 선택 화면 - 파란 버튼 복구 */
        #selection-page { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background-color: #f0f2f5; 
        }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-main { font-size: 38px; font-weight: bold; color: #0052cc; letter-spacing: 2px; }
        .logo-sub { font-size: 18px; color: #555; margin-top: 8px; font-weight: bold; }
        
        .select-card { 
            background: white; padding: 50px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 450px; text-align: center; 
        }
        .styled-select { 
            width: 100%; padding: 15px; font-size: 16px; border: 2px solid #e1e4e8; 
            border-radius: 12px; margin-bottom: 30px; outline: none;
        }
        /* 파란색 시작 버튼 */
        .start-btn { 
            width: 100%; padding: 18px; background: #0052cc; color: white; border: none; 
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: 0.3s;
        }
        .start-btn:hover { background: #0041a3; }

        /* [2페이지] 일지 작성 화면 */
        #report-page { display: none; padding: 20px 0; }
        .no-print { display: flex; justify-content: space-between; width: 190mm; margin: 0 auto 10px auto; }
        .back-btn { background: #fff; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 6px; }
        .print-btn { background: #0052cc; color: white; border: none; padding: 8px 25px; cursor: pointer; border-radius: 6px; font-weight: bold; }

        /* A4 컨테이너 */
        .container { 
            width: 210mm; min-height: 297mm; margin: 0 auto; padding: 15mm 20mm; 
            background: #fff; box-sizing: border-box; 
        }

        h1 { text-align: center; text-decoration: underline; margin: 0 0 20px 0; font-size: 24px; }
        
        /* 테이블 선 일직선 정렬 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: -1px; }
        th, td { border: 1px solid #000; padding: 8px 5px; text-align: center; font-size: 13px; height: 25px; }
        th { background-color: #f2f2f2; font-weight: bold; }
        
        input { width: 95%; border: none; font-size: 13px; text-align: center; background: transparent; outline: none; }
        input[type="checkbox"] { transform: scale(1.1); vertical-align: middle; }
        
        .content-box { 
            border: 1px solid #000; padding: 15px; font-size: 13px; 
            margin: 20px 0; line-height: 1.6; text-align: left; 
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: none; }
            .no-print { display: none !important; }
            .container { width: 210mm; height: 297mm; padding: 15mm 20mm; border: none !important; margin: 0; }
        }
    </style>
</head>
<body>

<div id="selection-page">
    <div class="logo-area">
        <div class="logo-main">WILL & VISION</div>
        <div class="logo-sub">안전보건 관리 시스템</div>
    </div>
    <div class="select-card">
        <div style="font-size:18px; font-weight:bold; margin-bottom:20px;">사업장을 선택해 주세요</div>
        <select id="siteInput" class="styled-select">
            <option value="">-- 사업장 목록 --</option>
            <option value="아시아나 인천캐빈지원">아시아나 인천캐빈지원</option>
            <option value="㈜신동진 효성반포빌딩">㈜신동진 효성반포빌딩</option>
            <option value="공덕개발㈜ 효성공덕빌딩">공덕개발㈜ 효성공덕빌딩</option>
            <option value="효성첨단소재㈜등촌동빌딩">효성첨단소재㈜등촌동빌딩</option>
            <option value="효성토요타(서초지점)">효성토요타(서초지점)</option>
            <option value="유씨케이파트너스">유씨케이파트너스</option>
            <option value="용인 세브란스병원">용인 세브란스병원</option>
            <option value="용인 세브란스병원 장례식장">용인 세브란스병원 장례식장</option>
            <option value="원주기독병원">원주기독병원</option>
            <option value="라까사호텔(FM)">라까사호텔(FM)</option>
            <option value="KCB빌딩">KCB빌딩</option>
            <option value="상제리제센터">상제리제센터</option>
            <option value="당산skv1">당산skv1</option>
            <option value="디씨티㈜">디씨티㈜</option>
            <option value="DM스퀘어">DM스퀘어</option>
        </select>
        <button class="start-btn" onclick="goToReport()">교육일지 작성하기</button>
    </div>
</div>
