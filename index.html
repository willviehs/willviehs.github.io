<!DOCTYPE html>

<head>

    <title>WILL & VISION 안전보건 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* [1페이지] 선택 화면 */
        #selection-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .logo-main { font-size: 32px; font-weight: bold; color: #0052cc; margin-bottom: 5px; }
        .logo-sub { font-size: 16px; color: #555; font-weight: bold; margin-bottom: 30px; }
        .select-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 400px; text-align: center; }
        .styled-select { width: 100%; padding: 12px; font-size: 15px; border: 2px solid #e1e4e8; border-radius: 10px; margin-bottom: 20px; }
        .start-btn { width: 100%; padding: 15px; background: #0052cc; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* [2페이지] 일지 작성 화면 - A4 일직선 레이아웃 */
        #report-page { display: none; padding: 20px 0; background-color: #f4f7f9; }
        .no-print { display: flex; justify-content: space-between; width: 190mm; margin: 0 auto 10px auto; }
        .back-btn { background: #fff; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .print-btn { background: #0052cc; color: white; border: none; padding: 8px 25px; cursor: pointer; border-radius: 6px; font-weight: bold; }

        /* A4 규격 컨테이너 */
        .container { 
            width: 210mm; 
            min-height: 297mm;
            margin: 0 auto; 
            padding: 15mm 20mm; 
            background: #fff; 
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; text-decoration: underline; margin: 0 0 20px 0; font-size: 24px; }
        
        /* 테이블 일직선 정렬 최적화 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: -1px; }
        th, td { border: 1px solid #000; padding: 8px 5px; text-align: center; font-size: 13px; height: 24px; vertical-align: middle; }
        th { background-color: #f2f2f2; font-weight: bold; }
        
        /* 입력 요소 */
        input { width: 95%; border: none; font-size: 13px; text-align: center; background: transparent; outline: none; font-family: inherit; }
        input[type="checkbox"] { transform: scale(1.1); vertical-align: middle; margin-right: 5px; }
        
        /* 교육내용 박스 */
        .content-box { 
            border: 1px solid #000; padding: 15px; font-size: 13px; 
            margin: 20px 0; line-height: 1.6; text-align: left; 
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: none; }
            .no-print { display: none !important; }
            .container { width: 210mm; height: 297mm; padding: 15mm 20mm; border: none !important; box-shadow: none; margin: 0; }
        }
    </style>
</head>
