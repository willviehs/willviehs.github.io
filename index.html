<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WILL & VISION 안전보건 관리 시스템</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* [1페이지] 선택 화면 스타일 */
        #selection-page { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; }
        .logo-area { margin-bottom: 40px; }
        .logo-main { font-size: 36px; font-weight: bold; color: #0066ff; letter-spacing: 1px; }
        .logo-sub { font-size: 20px; color: #333; margin-top: 10px; font-weight: bold; }
        .select-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 450px; }
        .card-title { font-size: 18px; margin-bottom: 25px; color: #444; font-weight: bold; }
        .styled-select { width: 100%; padding: 15px; font-size: 16px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 25px; background: #fff; cursor: pointer; }
        .start-btn { width: 100%; padding: 15px; background: #0052cc; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }

        /* [2페이지] 일지 화면 스타일 (초기엔 숨김) */
        #report-page { display: none; padding: 30px; }
        .container { max-width: 850px; margin: 0 auto; border: 2px solid #333; padding: 40px; background: #fff; }
        
        .no-print { display: flex; justify-content: space-between; max-width: 850px; margin: 0 auto 25px auto; }
        .back-btn { background: #eeeeee; color: #333; border: 1px solid #ccc; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .print-btn { background: #0052cc; color: white; border: none; padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        /* 표 및 서식 스타일 */
        h1 { text-align: center; text-decoration: underline; margin-bottom: 30px; font-size: 26px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f9f9f9; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="date"], input[type="time"] { width: 95%; border: 1px solid #eee; padding: 5px; font-size: 14px; text-align: center; }
        .content-box { border: 2px solid #333; padding: 20px; text-align: left; font-size: 14px; margin: 20px 0; min-height: 150px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .container { border: none !important; width: 100%; padding: 0; }
            input { border: none !important; }
        }
    </style>
</head>
<body>

<div id="selection-page">
    <div class="logo-area">
        <div class="logo-main">WILL & VISION</div>
        <div class="logo-sub">안전보건 관리 시스템</div>
    </div>
    <div class="select-card">
        <div class="card-title">담당 사업장을 선택하세요</div>
        <select id="siteInput" class="styled-select">
            <option value="">-- 사업장 목록 --</option>
            <option value="SK-C타워">SK-C타워</option>
            <option value="윌앤비전 본사">윌앤비전 본사</option>
            <option value="영등포 사업장">영등포 사업장</option>
            <option value="당산동 관리단지">당산동 관리단지</option>
        </select>
        <button class="start-btn" onclick="goToReport()">교육일지 작성하기</button>
    </div>
</div>

<div id="report-page">
    <div class="no-print">
        <button class="back-btn" onclick="goToStart()">◀ 이전으로</button
