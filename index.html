<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WILL & VISION 안전보건 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="selection-page">
        <div class="logo-area">
            <div class="logo-main">WILL & VISION</div>
            <div class="logo-sub">안전보건 관리 시스템</div>
        </div>
        <div class="select-card">
            <div class="card-title">담당 사업장을 선택하세요</div>
            <select id="siteInput" class="styled-select">
                <option value="">-- 사업장 목록 --</option>
                <option value="아시아나 인천캐빈지원">아시아나 인천캐빈지원</option>
                <option value="SK-C">SK-C</option>
                <option value="당산skv1">당산skv1</option>
                <option value="㈜신동진 효성반포빌딩">㈜신동진 효성반포빌딩</option>
                </select>
            <button class="start-btn" onclick="enterSystem()">시스템 접속하기</button>
        </div>
    </div>

    <script>
        function enterSystem() {
            const site = document.getElementById('siteInput').value;
            if (!site) {
                alert("사업장을 선택해 주세요.");
                return;
            }
            // 선택한 사업장 이름을 브라우저에 저장하고 카테고리 페이지로 이동
            localStorage.setItem('selectedSite', site);
            window.location.href = 'category.html';
        }
    </script>
</body>
</html>
