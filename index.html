<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WILL & VISION 안전보건 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* [1페이지] 선택 화면 */
        #selection-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .logo-main { font-size: 32px; font-weight: bold; color: #0052cc; margin-bottom: 5px; }
        .logo-sub { font-size: 16px; color: #555; font-weight: bold; margin-bottom: 30px; }
        .select-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 400px; text-align: center; }
        .styled-select { width: 100%; padding: 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        .start-btn { width: 100%; padding: 15px; background: #0052cc; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* [2페이지] 일지 작성 화면 - 초슬림 A4 레이아웃 */
        #report-page { display: none; padding: 10px 0; }
        .no-print { display: flex; justify-content: space-between; width: 190mm; margin: 0 auto 10px auto; }
        .back-btn { background: #fff; border: 1px solid #ccc; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .print-btn { background: #0052cc; color: white; border: none; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px; }

        /* 인쇄 영역 설정 */
        .container { 
            width: 185mm; /* 폭을 약간 줄여 인쇄 여백 확보 */
            margin: 0 auto; 
            padding: 8mm 12mm; 
            background: #fff; 
            box-sizing: border-box;
        }

        h1 { text-align: center; text-decoration: underline; margin: 0 0 10px 0; font-size: 20px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: -1px; }
        th, td { border: 1px solid #000; padding: 4px 2px; text-align: center; font-size: 11px; height: 18px; }
        th { background-color: #f2f2f2; font-weight: bold; }
        
        input { width: 95%; border: none; font-size: 11px; text-align: center; background: transparent; outline: none; }
        input[type="checkbox"] { transform: scale(0.9); vertical-align: middle; }
        
        .content-box { 
            border: 1px solid #000; padding: 8px 12px; font-size: 11px; 
            margin: 10px 0; line-height: 1.4; text-align: left; 
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: none; }
            .no-print { display: none !important; }
            .container { width: 210mm; height: 297mm; padding: 10mm 15mm; border: none !important; margin: 0; }
            /* 인쇄 시 입력창 화살표 등 숨기기 */
            input[type="date"]::-webkit-inner-spin-button, 
            input[type="date"]::-webkit-calendar-picker-indicator,
            input[type="time"]::-webkit-inner-spin-button,
            input[type="time"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; }
        }
    </style>
</head>
