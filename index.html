        /* 첫 화면: 사업장 선택 */
        #selection-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .select-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        .styled-select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        .start-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* 메인 화면: 교육일지 */
        #report-page { display: none; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; border: 1px solid #000; padding: 40px; background: #fff; }

        .back-btn { background: #6c757d; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; }
        .print-btn { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        h1 { text-align: center; text-decoration: underline; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 14px; height: 25px; }
        th { background-color: #f2f2f2; width: 120px; }
        
        input { width: 95%; border: 1px solid #eee; padding: 5px; font-family: inherit; }
        .content-box { border: 1px solid #000; padding: 15px; text-align: left; font-size: 14px; margin-bottom: 20px; }
